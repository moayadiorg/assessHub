name: assess-hub-dev

services:
  db:
    image: mysql:8.4
    container_name: assess-hub-db
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: assess_hub
      MYSQL_USER: assesshub
      MYSQL_PASSWORD: assesshub
    volumes:
      - assess_hub_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  assess_hub_dev_data:
