# Full local stack: dev MySQL + production-style app build.
# Use `npm run dev:full` to bring everything up (host runs the seed against the DB
# before the app starts).
#
# Reuses the same project name and volume as docker-compose.dev.yml, so seeded
# data is shared between `dev:local` (hot-reload) and `dev:full` (containerized app).

name: assess-hub-dev

include:
  - docker-compose.dev.yml

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assess-hub-app
    ports:
      - "127.0.0.1:3005:3000"
    environment:
      DATABASE_URL: mysql://assesshub:assesshub@db:3306/assess_hub
      NEXTAUTH_URL: http://localhost:3005
      NEXTAUTH_SECRET: dev-secret-do-not-use-in-prod-replace-with-32+chars
      ENABLE_DEV_AUTH: "true"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
