services:
  assess-hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assess-hub
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      - DATABASE_URL=mysql://assesshub:Cy*c.ZDTAT6e8wK*n3xfB@192.168.88.8:3306/assess_hub
      - NEXTAUTH_URL=${NEXTAUTH_URL:?NEXTAUTH_URL is required - set to your externally reachable URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_ID=${GITHUB_ID:-}
      - GITHUB_SECRET=${GITHUB_SECRET:-}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
