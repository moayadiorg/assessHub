services:
  mysql:
    image: mysql:8.0
    container_name: assess-hub-mysql
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: assess_hub
      MYSQL_USER: assesshub
      MYSQL_PASSWORD: assesshub_dev
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  assess-hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assess-hub
    restart: unless-stopped
    ports:
      - "3005:3000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - ENABLE_DEV_AUTH=true
      - DATABASE_URL=mysql://assesshub:assesshub_dev@mysql:3306/assess_hub
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3005}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-not-for-production}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_ID=${GITHUB_ID:-}
      - GITHUB_SECRET=${GITHUB_SECRET:-}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_data:
