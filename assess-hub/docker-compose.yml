services:
  assess-hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assess-hub
    restart: unless-stopped
    ports:
      - "3005:3000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - ENABLE_DEV_AUTH=true
      - DATABASE_URL=mysql://mysql:f8Z3fTtp6C2eOuhp8O9IE03KrTJT77GMJYhdj2VWslJUjIPH8Q4NWc6LyZVdWwom@jwcgwk8wsksocgsw0w44sows:3306/assess-hub
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3005}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-not-for-production}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_ID=${GITHUB_ID:-}
      - GITHUB_SECRET=${GITHUB_SECRET:-}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
